# Layover — example config. COPY this to accounts.ini and `chmod 600` before filling in.
# accounts.ini is git-ignored; never commit real passwords.
#
# One [section] per mailbox. Add as many as you like — they are swept in order.
# Dates use the IMAP format dd-Mon-yyyy (e.g. 01-Jan-2015). Empty "before" = up to today.
# Use since = 01-Jan-2000 to mean "everything in this mailbox".
#
# Auth: Gmail/Workspace need a 16-char APP PASSWORD (2-Step Verification must be ON):
#   https://myaccount.google.com/apppasswords
# IONOS/1&1 and most other hosts use the plain mailbox password.

[gmail]
host = imap.gmail.com
user = jane.doe@gmail.com
password = GMAIL_APP_PASSWORD
since = 01-Jan-2015
before =
folders = auto

[workspace]
host = imap.gmail.com
user = jane@example.com
password = WORKSPACE_APP_PASSWORD
since = 01-Jan-2015
before =
folders = auto

[ionos]
host = imap.ionos.de
user = jane@example.com
password = IONOS_MAILBOX_PASSWORD
since = 01-Jan-2010
before =
folders = auto

# Any number of extra mailboxes — e.g. an older personal account:
[gmail_old]
host = imap.gmail.com
user = j.doe.1998@gmail.com
password = GMAIL_OLD_APP_PASSWORD
since = 01-Jan-2005
before =
folders = auto
